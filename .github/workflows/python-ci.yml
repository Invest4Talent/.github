name: python-ci

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to install
        type: string
        default: "3.12"
      working-directory:
        description: Project root (where pyproject.toml lives)
        type: string
        default: "."
      runs-on:
        description: Runner label
        type: string
        default: ubuntu-latest

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          enable-cache: true
      - run: uv python install ${{ inputs.python-version }}
      - run: uv sync --locked --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck-python:
    needs: lint-python
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          enable-cache: true
      - run: uv python install ${{ inputs.python-version }}
      - run: uv sync --locked --dev
      - run: uv run mypy .

  test-python:
    needs: typecheck-python
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          enable-cache: true
      - run: uv python install ${{ inputs.python-version }}
      - run: uv sync --locked --dev
      - run: uv run pytest -q

  deps-audit:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          enable-cache: true
      - run: uv python install ${{ inputs.python-version }}
      - run: uv sync --locked --dev
      - run: uv run pip-audit
