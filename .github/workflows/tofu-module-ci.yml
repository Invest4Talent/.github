name: tofu-module-ci

on:
  workflow_call:
    inputs:
      tofu_version:
        description: OpenTofu version to install
        type: string
        default: "1.9.1"
      working-directory:
        description: Module root
        type: string
        default: "."
      runs-on:
        description: Runner label
        type: string
        default: ubuntu-latest

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-tofu-module-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4  # v2.0.2
        with:
          tofu_version: ${{ inputs.tofu_version }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a  # v6.3.0

      - name: Initialize TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --recursive

      - name: Check formatting
        run: tofu fmt -check -recursive

      - name: Initialize (no backend)
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

      - name: Run OpenTofu tests (if any)
        run: |
          if find . -name '*.tftest.hcl' -print -quit | grep -q .; then
            tofu test
          else
            echo "No .tftest.hcl files found; skipping tofu test."
          fi

      - name: Trivy misconfiguration scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: config
          scan-ref: ${{ inputs.working-directory }}
          severity: HIGH,CRITICAL
          exit-code: "1"
