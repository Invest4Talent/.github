name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v1.2.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    # The `version` input is mapped into the shell via `env:` on every step
    # that uses it. Never interpolate `${{ inputs.version }}` directly into
    # a `run:` script — that expansion happens BEFORE the shell parses the
    # script, so a malformed input can inject arbitrary commands.
    # See https://securitylab.github.com/research/github-actions-untrusted-input/
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match vX.Y.Z (got: $VERSION)"
            exit 1
          fi

      - name: Verify version does not already exist
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create immutable tag
        run: |
          git tag -a "$VERSION" -m "release $VERSION"
          git push origin "$VERSION"

      - name: Move major tag
        run: |
          MAJOR="${VERSION%%.*}"
          git tag -f "$MAJOR" "$VERSION"
          git push -f origin "$MAJOR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
